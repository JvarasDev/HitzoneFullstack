    url: jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.prexixehpjotlgfapwfb
    password: H1tZ0n3p0sswo4db
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    user:
      name: jvaras_admin
      password: Telco12345

# Puerto del Config Server (criterio de aceptación: 8888)
