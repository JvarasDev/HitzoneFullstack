spring:
  application:
    name: config-server

  # Config Server en modo nativo (lee YMLs del classpath)
  cloud:
    config:
      server:
        native:
          searchLocations: classpath:/config
      # Deshabilitar el cliente de config en este propio servidor
      enabled: false
      fail-fast: false   # el server no necesita fail-fast, sólo los clientes

  profiles:
    active: native

  # Base de datos Supabase
